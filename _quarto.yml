project:
  type: website

format:
  html:
    theme: cosmo
    css: styles.css1  # 关键：全局加载样式
    toc: true
    toc-location: right


website:
  title: "Soil Science & Data"
  navbar:
    background: "rgba(255, 255, 255, 0.9)"
    foreground: "#2c3e50"
    border-radius: "12px"
    box-shadow: "0 4px 16px rgba(0, 0, 0, 0.08)"
    backdrop-filter: "blur(10px)"
    border: "1px solid rgba(255, 255, 255, 0.2)"
    left:
      - href: index.qmd
        text: 🏠 首页
      - href: about.qmd
        text: 👨‍💻 关于
    right:
      - icon: github
        href: "https://github.com/RenYuan916"
        aria-label: GitHub
  sidebar:
    style: "docked"
    search: true
    contents:
      - section: "个人简介"
        contents:
          - href: index.qmd
            text: 首页
          - href: about.qmd
            text: 关于

format:
  html:
    theme: cosmo
    css: styles.css1
    toc: true
    toc-location: right
    include-in-header: |
      <style>
        /* 导航栏悬停效果 */
        .navbar-nav .nav-link:hover {
          color: #2c85d4 !important;
          transform: translateY(-2px);
          transition: all 0.3s ease;
        }
        /* 网站标题样式 */
        .navbar-brand {
          font-weight: 700;
          background: linear-gradient(90deg, #2c85d4, #6a5acd);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent !important;
        }
        /* 导航栏整体圆角 */
        .navbar {
          margin: 0.8rem auto;
          max-width: 95%;
          border-radius: 12px !important;
        }
      </style>